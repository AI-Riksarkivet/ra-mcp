[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
artifacts = ["src/ra_mcp_sjomanshus_mcp/dist/**"]

[tool.hatch.build.targets.wheel]
packages = ["src/ra_mcp_sjomanshus_mcp"]

[project]
name = "ra-mcp-sjomanshus-mcp"
version = "0.11.3"
description = "MCP tools for Swedish seamen's house records (Sjömanshus) search"
requires-python = ">=3.13"
license = "Apache-2.0"
dependencies = [
    "ra-mcp-sjomanshus-lib",
    "fastmcp==3.1.1",
]

[tool.uv.sources]
ra-mcp-sjomanshus-lib = { workspace = true }
