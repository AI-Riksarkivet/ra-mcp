[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ra_mcp_faltjagare_mcp"]

[project]
name = "ra-mcp-faltjagare-mcp"
version = "0.11.3"
description = "MCP tools for Jämtland field regiment soldier records (Fältjägare) search"
requires-python = ">=3.13"
license = "Apache-2.0"
dependencies = [
    "ra-mcp-faltjagare-lib",
    "fastmcp==3.1.1",
]

[tool.uv.sources]
ra-mcp-faltjagare-lib = { workspace = true }
