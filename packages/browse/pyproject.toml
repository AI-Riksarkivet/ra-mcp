[project]
name = "ra-mcp-browse"
version = "0.3.0"
description = "Browse domain for Riksarkivet document pages"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "ra-mcp-common",
    "ra-mcp-alto",
    "ra-mcp-iiif",
    "ra-mcp-oai-pmh",
]
license = "Apache-2.0"

[tool.uv.sources]
ra-mcp-common = { workspace = true }
ra-mcp-alto = { workspace = true }
ra-mcp-iiif = { workspace = true }
ra-mcp-oai-pmh = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ra_mcp_browse"]
