[project]
name = "ra-mcp-label-mcp"
version = "0.8.0"
description = "MCP tool for converting ALTO XML to Label Studio tasks"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fastmcp>=3.1.1",
    "httpx>=0.28.0",
    "label-studio-sdk>=2.0.17",
    "ra-mcp-common",
]
license = "Apache-2.0"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ra_mcp_label_mcp"]
