[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
artifacts = ["src/ra_mcp_dds_mcp/dist/**"]

[tool.hatch.build.targets.wheel]
packages = ["src/ra_mcp_dds_mcp"]

[project]
name = "ra-mcp-dds-mcp"
version = "0.11.3"
description = "MCP tools for Swedish church records (DDS) search — births, deaths, marriages"
requires-python = ">=3.13"
license = "Apache-2.0"
dependencies = [
    "ra-mcp-dds-lib",
    "fastmcp==3.1.1",
]

[tool.uv.sources]
ra-mcp-dds-lib = { workspace = true }
