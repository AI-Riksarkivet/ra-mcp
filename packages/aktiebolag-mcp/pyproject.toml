[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ra_mcp_aktiebolag_mcp"]

[project]
name = "ra-mcp-aktiebolag-mcp"
version = "0.11.3"
description = "MCP tools for Swedish joint-stock company records (Aktiebolag 1901-1935) search"
requires-python = ">=3.13"
license = "Apache-2.0"
dependencies = [
    "ra-mcp-aktiebolag-lib",
    "fastmcp==3.1.1",
]

[tool.uv.sources]
ra-mcp-aktiebolag-lib = { workspace = true }
