[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ra_mcp_wincars_mcp"]

[project]
name = "ra-mcp-wincars-mcp"
version = "0.11.3"
description = "MCP tools for Norrland vehicle registration records (Wincars) search"
requires-python = ">=3.13"
license = "Apache-2.0"
dependencies = [
    "ra-mcp-wincars-lib",
    "fastmcp==3.2.0",
]

[tool.uv.sources]
ra-mcp-wincars-lib = { workspace = true }
