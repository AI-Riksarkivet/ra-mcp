[project]
name = "ra-mcp-search-mcp"
version = "0.3.0"
description = "MCP tools for Riksarkivet search and browse"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "ra-mcp-search-lib",
    "fastmcp>=3.1.1",
]
license = "Apache-2.0"

[tool.uv.sources]
ra-mcp-search-lib = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ra_mcp_search_mcp"]
