[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
artifacts = ["src/ra_mcp_specialsok_mcp/dist/**"]

[tool.hatch.build.targets.wheel]
packages = ["src/ra_mcp_specialsok_mcp"]

[project]
name = "ra-mcp-specialsok-mcp"
version = "0.11.3"
description = "MCP tools for Specialsök datasets (flygvapen, fångrullor, kurhuset, press, video)"
requires-python = ">=3.13"
license = "Apache-2.0"
dependencies = [
    "ra-mcp-specialsok-lib",
    "fastmcp==3.1.1",
]

[tool.uv.sources]
ra-mcp-specialsok-lib = { workspace = true }
