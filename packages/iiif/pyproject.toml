[project]
name = "ra-mcp-iiif"
version = "0.3.0"
description = "IIIF Collections client for Riksarkivet"
requires-python = ">=3.13"
dependencies = [
    "ra-mcp-common",
]
license = "Apache-2.0"

[tool.uv.sources]
ra-mcp-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ra_mcp_iiif"]
