[project]
name = "ra-mcp-browse-lib"
version = "0.3.0"
description = "Browse domain for Riksarkivet document pages"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "ra-mcp-common",
    "ra-mcp-xml",
    "ra-mcp-iiif-lib",
    "ra-mcp-oai-pmh-lib",
]
license = "Apache-2.0"

[tool.uv.sources]
ra-mcp-common = { workspace = true }
ra-mcp-xml = { workspace = true }
ra-mcp-iiif-lib = { workspace = true }
ra-mcp-oai-pmh-lib = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ra_mcp_browse_lib"]
