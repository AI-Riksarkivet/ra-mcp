[project]
name = "ra-mcp-xml"
version = "0.3.0"
description = "ALTO and PAGE XML client for Riksarkivet transcribed documents"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.0.0",
    "ra-mcp-common",
]
license = "Apache-2.0"

[tool.uv.sources]
ra-mcp-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ra_mcp_xml"]
