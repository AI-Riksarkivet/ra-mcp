[project]
site_name = "ra-mcp"
site_description = "MCP server and CLI for searching and browsing transcribed historical documents from the Swedish National Archives (Riksarkivet)."
site_author = "AI-Riksarkivet"
site_url = "https://ai-riksarkivet.github.io/ra-mcp/"
copyright = """
Copyright &copy; 2026 AI-Riksarkivet
"""
repo_url = "https://github.com/AI-Riksarkivet/ra-mcp"
repo_name = "AI-Riksarkivet/ra-mcp"

nav = [
  { "ra-mcp" = [
    "index.md",
  ]},
  { "Getting Started" = [
    "getting-started/index.md",
    "getting-started/plugins.md",
    "getting-started/local.md",
  ]},
  { "How it Works" = [
    "how-it-works/index.md",
    "how-it-works/data-sources.md",
    "how-it-works/architecture.md",
  ]},
  { "Tools & Skills" = [
    "tools/index.md",
    "tools/tools.md",
    "tools/skills.md",
  ]},
  { "CLI" = [
    "cli/index.md",
    "cli/search.md",
    "cli/browse.md",
    "cli/serve.md",
  ]},
  { "Development" = [
    "development/index.md",
    "development/deployment.md",
    "development/observability.md",
    "development/security.md",
  ]},
  { "API" = [
    "api/index.md",
    "api/common.md",
    "api/search.md",
    "api/browse.md",
    "api/mcp-tools.md",
  ]},
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
language = "en"
favicon = "assets/favicon.ico"
logo = "assets/ra.svg"
custom_dir = "docs/overrides"

features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

# ----------------------------------------------------------------------------
# Color palette (light/dark toggle)
# ----------------------------------------------------------------------------
[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "blue"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "blue"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# Icons
# ----------------------------------------------------------------------------
[project.theme.icon]
repo = "fontawesome/brands/github"

# ----------------------------------------------------------------------------
# Social links
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/AI-Riksarkivet/ra-mcp"

[[project.extra.social]]
icon = "fontawesome/brands/docker"
link = "https://hub.docker.com/r/riksarkivet/ra-mcp"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/ra-mcp/"

# ----------------------------------------------------------------------------
# Analytics (Matomo)
# ----------------------------------------------------------------------------
[project.extra.analytics]
provider = "custom"

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.pymdownx.snippets]
base_path = ["."]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

# ----------------------------------------------------------------------------
# Plugins — mkdocstrings (API reference)
# ----------------------------------------------------------------------------
[project.plugins.mkdocstrings]
default_handler = "python"

[project.plugins.mkdocstrings.handlers.python]
paths = [
  "packages/common/src",
  "packages/search-lib/src",
  "packages/browse-lib/src",
  "packages/xml/src",
  "packages/iiif-lib/src",
  "packages/oai-pmh-lib/src",
  "packages/search-mcp/src",
  "packages/browse-mcp/src",
  "packages/guide-mcp/src",
  "packages/htr-mcp/src",
  "packages/viewer-mcp/src",
]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = true
show_root_heading = true
show_root_full_path = false
show_symbol_type_heading = true
show_symbol_type_toc = true
show_bases = true
merge_init_into_class = true
filters = ["!^_"]
